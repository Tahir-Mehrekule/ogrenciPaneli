version: "3.9"

services:
  # PostgreSQL Veritabanı
  db:
    image: postgres:15-alpine
    container_name: unitrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}
      POSTGRES_DB: ${POSTGRES_DB:-unitrack}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unitrack-api
    restart: unless-stopped
    ports:
      - "19000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-unitrack}
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3002,http://localhost:19006,http://localhost:8081"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys;sys.exit(0 if urllib.request.urlopen(\"http://localhost:8000/\").status==200 else 1)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    entrypoint: ""
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Adminer (DB Web UI) — sadece development'ta kullan
  adminer:
    image: adminer:latest
    container_name: unitrack-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

  # MinIO (S3 Uyumlu Dosya Depolama)
  minio:
    image: minio/minio:latest
    container_name: unitrack-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER env var is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD env var is required}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
