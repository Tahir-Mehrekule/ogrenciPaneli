# Alembic yapılandırma dosyası.
# Veritabanı URL'si env.py üzerinden settings'ten okunur — bu dosyada tanımlanmaz.

[alembic]
# Migration dosyalarının bulunduğu klasör (bu dosyaya göre relatif)
script_location = alembic

# Migration dosyası adlandırma şablonu
file_template = %%(rev)s_%%(slug)s

# Önce env.py'a bakılır — URL orada ayarlanır
# sqlalchemy.url = buraya yazılmaz (güvenlik)

[post_write_hooks]
# Migration sonrası hook'lar (opsiyonel)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
